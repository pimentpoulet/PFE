<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
        }
    </style>
    <title>Beehive Dashboard</title>
</head>
<body>
    <h1>Beehive Dashboard</h1>

    <p>Voltage: <span id="voltage-data">Waiting for data...</span> V</p>
    <p>Temperature: <span id="temp-data">Waiting for data...</span> °C</p>
    <p>Humidity: <span id="hum-data">Waiting for data...</span> %</p>
    <p>CO2: <span id="co2-data">Waiting for data...</span> ppm</p>

    <div style="max-width: 800px; margin: 20px auto;">
        <canvas id="tempChart"></canvas>
    </div>

    <style>
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .btn-group button {
            background-color: #34495e;
            color: white;
            border: 1px solid #5d6d7e;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn-group button:hover {
            background-color: #e67e22; /* Bee orange hover */
        }
        .btn-group button.active {
            background-color: #e67e22;
            border-color: #d35400;
        }
    </style>

    <div class="btn-group">
        <button onclick="changeRange(10, this)">10m</button>
        <button onclick="changeRange(30, this)">30m</button>
        <button onclick="changeRange(60, this)">1h</button>
        <button onclick="changeRange(1440, this)">24h</button>
        <button onclick="changeRange('all', this)" class="active">Max</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let tempChart;

        function initChart() {
            const ctx = document.getElementById('tempChart').getContext('2d');
            tempChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Temperature (°C)',
                        data: [],
                        borderColor: '#e67e22',
                        backgroundColor: 'rgba(230, 126, 34, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { 
                            title: { display: true, text: 'Time', color: '#ecf0f1' },
                            ticks: { color: '#bdc3c7' }
                        },
                        y: { 
                            title: { display: true, text: 'Temp (°C)', color: '#ecf0f1' },
                            ticks: { color: '#bdc3c7' }
                        }
                    }
                }
            });
        }

        let currentRange = 'all'; // Default range

    function changeRange(range, btn) {
        currentRange = range;
        
        // Visual feedback: update active button
        document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        updateDashboard();
    }

    function updateDashboard() {
        fetch('/api/history')
            .then(response => response.json())
            .then(jsonResponse => {
                const allReadings = jsonResponse.data;
                if (!allReadings || allReadings.length === 0) return;

                let displayReadings;
                
                // Helper to combine your date and time columns from Python/SQLite
                const getJsDate = (r) => new Date(`${r.date}T${r.time}`);

                if (currentRange === 'all') {
                    displayReadings = allReadings;
                } else {
                    const cutoff = new Date(Date.now() - currentRange * 60000);
                    displayReadings = allReadings.filter(r => getJsDate(r) > cutoff);
                }

                // Update Chart
                tempChart.data.labels = displayReadings.map(r => {
                    return getJsDate(r).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                });
                tempChart.data.datasets[0].data = displayReadings.map(r => r.temperature);
                
                tempChart.update('none');

                // Update Numeric Text
                const latest = allReadings[allReadings.length - 1];
                document.getElementById("voltage-data").innerText = latest.voltage;
                document.getElementById("temp-data").innerText = latest.temperature;
                document.getElementById("hum-data").innerText = latest.humidity;
                document.getElementById("co2-data").innerText = latest.CO2;
            });
    }

        initChart();
        updateDashboard();
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
