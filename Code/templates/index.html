<!DOCTYPE html>
<html>
<head>
    <title>Beehive Dashboard</title>
</head>
<body>
    <h1>Beehive Dashboard</h1>

    <p>Voltage: <span id="voltage-data">Waiting for data...</span> V</p>
    <p>Temperature: <span id="temp-data">Waiting for data...</span> °C</p>
    <p>Humidity: <span id="hum-data">Waiting for data...</span> %</p>
    <p>CO2: <span id="co2-data">Waiting for data...</span> ppm</p>

    <script>
        function updateDashboard() {
            // 1. Ask the server for the history data
            fetch('/api/history')
                .then(response => response.json()) 
                .then(jsonResponse => {
                    // 2. Extract the actual array of readings from the new JSON format
                    let readings = jsonResponse.data;
                    
                    // 3. Make sure we actually have data before trying to update
                    if (readings.length > 0) {
                        // 4. Find the most recent reading (the last object in the list)
                        let lastIndex = readings.length - 1;
                        let latestReading = readings[lastIndex];

                        // 5. Update the HTML using the database column names!
                        document.getElementById("voltage-data").innerText = latestReading.voltage;
                        document.getElementById("temp-data").innerText = latestReading.temperature;
                        document.getElementById("hum-data").innerText = latestReading.humidity;
                        document.getElementById("co2-data").innerText = latestReading.CO2;
                    }
                })
                .catch(error => console.error("Error fetching data:", error));
        }

        // Run this function automatically every 5000 milliseconds (5 seconds)
        setInterval(updateDashboard, 5000);

        // Also run it once immediately when the page first loads
        updateDashboard();
    </script>
</body>
</html>
