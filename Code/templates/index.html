<!DOCTYPE html>
<html>
<head>
    <title>Beehive Dashboard</title>
</head>
<body>
    <h1>Beehive Dashboard</h1>

    <p>Voltage: <span id="voltage-data">Waiting for data...</span> V</p>
    <p>Temperature: <span id="temp-data">Waiting for data...</span> °C</p>
    <p>Humidity: <span id="hum-data">Waiting for data...</span> %</p>
    <p>CO2: <span id="co2-data">Waiting for data...</span> ppm</p>

    <script>
        function updateDashboard() {
            // 1. Ask the server for the history data
            fetch('/api/history')
                .then(response => response.json()) // 2. Convert it to a JS object
                .then(data => {
                    // 3. Find the index of the most recent reading (the last one in the list)
                    let lastIndex = data.t.length - 1;

                    // 4. Update the temperature on the page
                    document.getElementById("voltage-data").innerText = data.v[lastIndex];
                    document.getElementById("temp-data").innerText = data.t[lastIndex];
                    document.getElementById("hum-data").innerText = data.h[lastIndex];
                    document.getElementById("co2-data").innerText = data.co2[lastIndex];

                    // TODO: Update Voltage, Humidity, and CO2 here!
                });
        }

        // Run this function automatically every 5000 milliseconds (5 seconds)
        setInterval(updateDashboard, 5000);

        // Also run it once immediately when the page first loads
        updateDashboard();
    </script>
</body>
</html>
